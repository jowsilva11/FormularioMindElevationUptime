name: keep-render-warm

# Mantém o worker do Render acordado (o plano free dorme após ~15 min sem tráfego).
#
# IMPORTANTE: coloque este arquivo em um repositório PÚBLICO, criado só pra isso.
# Em repo privado, o GitHub Actions free tem só 2.000 min/mês e cada run conta
# como 1 min cheio -> um cron de 5 min estoura o limite e para no meio do mês.
# Em repo público os minutos são ilimitados. O arquivo não contém nada sensível,
# só um ping numa URL pública, então deixar o repo público é seguro.
#
# Caminho no repo: .github/workflows/keep-render-warm.yml

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos (menor intervalo permitido pelo GitHub)
  workflow_dispatch:          # permite rodar manualmente pelo botão "Run workflow" (pra testar)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pingar /saude do worker
        run: |
          URL="https://mind-elevation-worker.onrender.com/saude"

          # --max-time 45: se o serviço estiver frio, o cold start pode levar
          # até ~30s; 45s dá folga pra ele acordar e responder 200 nesta mesma chamada.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "$URL")
          echo "Resposta do worker: HTTP $code"

          if [ "$code" != "200" ]; then
            echo "::warning::Health check retornou $code (esperado 200)"
          fi
